services:
  - type: web
    name: ninja-panda-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3847
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TWOCAPTCHA_API_KEY
        sync: false
      - key: FREE_CREDITS
        value: 10
